name: Create Current Main Image

# on:
#   push:
#     # Pattern matched against refs/tags
#     tags:
#       - '**' # Push events to every tag including hierarchical tags like v1.0/beta

on:
  push:
    branches:
      - main

# cancel a stale in-flight build so :main reflects the newest commit on rapid merges
concurrency:
  group: main-image
  cancel-in-progress: true

# maybe trigger build/push on release tags?
# but this also works for my use case
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Go Tests
      uses: ./.github/actions/tests
  # push to `main` image for testing/most up to date
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    environment: 'Dockerhub'
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Run Docker Build
      uses: ./.github/actions/docker
      with:
        latest: false
        dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
        dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
    