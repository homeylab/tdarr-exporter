version: 2
project_name: "tdarr-exporter"
archives:
  - id: main
    wrap_in_directory: true
    files:
      - "README.md"
builds:
  - main: "./cmd/exporter"
    binary: "tdarr-exporter"

    # -trimpath: strip absolute build paths for reproducible builds
    flags:
      - -trimpath
    # CGO disabled (env below) -> pure-Go static binary, so -extldflags is not needed
    ldflags:
      - -w -s -X github.com/prometheus/common/version.Version={{.Version}} -X github.com/prometheus/common/version.Revision={{.Commit}} -X github.com/prometheus/common/version.BuildDate={{.Date}}

    goarch:
      - "386"
      - "amd64"
      - "arm"
      - "arm64"
    goos:
      - "darwin"
      - "linux"
      - "freebsd"
      - "openbsd"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: openbsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
      - goos: openbsd
        goarch: arm64
    env:
      - CGO_ENABLED=0